work_dir: ./work_dir/signal-sgn

# feeder
feeder: feeders.feeder_ntus.Feeder
train_feeder_args:
  data_path: /path/to/NTU60_CS.npz  # Update with your data path
  split: train
  debug: False
  random_choose: False
  random_shift: False
  random_move: False
  window_size: 16
  normalization: False
  random_rot: True
  p_interval: [0.5, 1]
  vel: False
  bone: False

test_feeder_args:
  data_path: /path/to/NTU60_CS.npz  # Update with your data path
  split: test
  window_size: 16
  p_interval: [0.95]
  vel: False
  bone: False
  debug: False

# model - Signal-SGN
model: model.signalgcn.Model
model_args:
  num_class: 60
  num_point: 25
  num_person: 2
  graph: graph.ntu_rgb_d.Graph
  graph_args:
    labeling_mode: 'spatial'

# optim
weight_decay: 0.0001
base_lr: 0.05
lr_decay_rate: 0.1
step: [110, 130]
warm_up_epoch: 5

# training
device: [0]
batch_size: 64
test_batch_size: 64
num_epoch: 150
nesterov: True
